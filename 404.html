<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Page introuvable · Télia Moreau</title>
<meta name="description" content="Cette page n'existe pas.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#fefcf8" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1e293b" media="(prefers-color-scheme: dark)">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #f8fafc;
  --cream-2: #f1f5f9;
  --ink: #0f172a;
  --ink-2: #334155;
  --ink-3: #64748b;
  --pink: #f9a8d4;
  --pink-deep: #ec4899;
  --pink-darker: #db2777;
  --shadow-pink: 0 4px 16px rgba(236, 72, 153, 0.28);
}
@media (prefers-color-scheme: dark) {
  :root {
    --cream: #0a1929;
    --cream-2: #102a43;
    --ink: #f8fafc;
    --ink-2: #cbd5e1;
    --ink-3: #94a3b8;
    --pink-deep: #f472b6;
    --pink-darker: #ec4899;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  position: relative;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
/* Decorative blobs */
.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.3;
  pointer-events: none;
}
.blob-1 { width: 350px; height: 350px; background: var(--pink); top: -80px; right: -80px; }
.blob-2 { width: 300px; height: 300px; background: #bae6fd; bottom: -60px; left: -60px; }
@media (prefers-color-scheme: dark) { .blob { opacity: 0.15; } }

main {
  position: relative;
  z-index: 2;
  max-width: 540px;
  text-align: center;
}
.code {
  font-size: clamp(120px, 22vw, 200px);
  font-weight: 700;
  line-height: 1;
  color: var(--pink-deep);
  letter-spacing: -0.05em;
  margin-bottom: 16px;
  font-family: 'Space Grotesk', sans-serif;
}
h1 {
  font-size: clamp(28px, 5vw, 38px);
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
  color: var(--ink);
}
h1 em {
  display: inline-block;
  background: var(--pink);
  padding: 0 12px 4px;
  border-radius: 12px;
  transform: rotate(-1.5deg);
  font-style: normal;
  color: var(--ink);
}
p {
  color: var(--ink-2);
  font-size: 17px;
  line-height: 1.6;
  margin-bottom: 32px;
  font-weight: 500;
}
.cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 28px;
  background: var(--pink-deep);
  color: white;
  text-decoration: none;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 16px;
  border-radius: 100px;
  box-shadow: var(--shadow-pink);
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.cta:hover {
  background: var(--pink-darker);
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(236, 72, 153, 0.4);
  gap: 14px;
}
.cta:active { transform: scale(0.97); }
.cta::after { content: '→'; font-size: 18px; transition: transform 0.3s; }
.cta:hover::after { transform: translateX(2px); }
.cta:focus-visible { outline: 2.5px solid var(--pink-deep); outline-offset: 4px; }
::selection { background: var(--pink); color: var(--ink); }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<main>
  <div class="code">404</div>
  <h1>Cette <em>page</em> n'existe pas.</h1>
  <p>Tu es peut-être tombé sur une URL périmée, mal recopiée, ou un lien cassé.</p>
  <a href="/" class="cta">Retour à l'accueil</a>
</main>
</body>
</html>
